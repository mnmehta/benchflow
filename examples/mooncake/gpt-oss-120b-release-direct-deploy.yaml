apiVersion: benchflow.io/v1alpha1
kind: Experiment
metadata:
  name: gpt-oss-120b-llm-d-release-direct
spec:
  model:
    name:
      - openai/gpt-oss-120b
  deployment_profile:
    - llm-d-inference-scheduling
  benchmark_profile:
    - aiperf-mooncake-trace
  metrics_profile: detailed
  mlflow:
    tags:
      accelerator: H200
      routing_mode: direct-gateway
      note: "Direct deployment - benchmark via llm-d gateway (not direct service)"
    experiment: michey-gpt-oss-120b-mooncake
  namespace: benchflow
  execution:
    timeout: 8h
  overrides:
    runtime:
      resources:
        requests:
          cpu: "12"
        limits:
          cpu: "12"
