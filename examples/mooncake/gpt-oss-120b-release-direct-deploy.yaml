apiVersion: benchflow.io/v1alpha1
kind: Experiment
metadata:
  name: gpt-oss-120b-llm-d-release-direct
spec:
  model:
    name:
      - openai/gpt-oss-120b
  deployment_profile:
    - llm-d-inference-scheduling
  # NO benchmark_profile - deploy only
  metrics_profile: detailed
  namespace: benchflow
  execution:
    timeout: 8h
  overrides:
    runtime:
      resources:
        requests:
          cpu: "12"
        limits:
          cpu: "12"
